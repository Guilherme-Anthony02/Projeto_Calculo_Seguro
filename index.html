<!DOCTYPE html>

<head>

<body>
    <h1>CÁLCULO Seguro & IPVA Automotivo</h1>

    <div id="geral">
        <form id="formulario">
        <label for="modelo">Informe o modelo do veículo</label>
        <input type="text" name="modelo" id="modelo">
        
        <label for="marca">Informe a marca do veículo</label>
        <input type="text" name="marca" id="marca"> 

        <label for="placa">Informe a placa do veículo</label>
        <input type="text" name="marca" id="marca">

        <label for="ano">Informe o ano de fabricação do veículo</label>
        <input type="number" name="ano" id="ano">

        <label for="valor">Informe o valor de mercado do veículo</label>
        <input type="number" name="valor" id="valor">

        <label for="combustivel">Informe o tipo de combustível</label>
        <input type="text" name="combustivel" id="combustivel">
       

        </form>


    </div>
